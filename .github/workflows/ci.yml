name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Swift Tests (ConduitKit)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Resolve dependencies
        run: swift package resolve
        working-directory: Packages/ConduitKit

      - name: Run tests
        run: swift test --configuration debug
        working-directory: Packages/ConduitKit
