name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lancerkit-spm:
    name: LancerKit (SPM build + test)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_27.0.app || sudo xcode-select -s /Applications/Xcode_26.0.1.app || sudo xcode-select -s /Applications/Xcode_26.0.app || true
      - name: Resolve dependencies
        run: swift package resolve
        working-directory: Packages/LancerKit
      - name: Run tests
        run: swift test --configuration debug
        working-directory: Packages/LancerKit

  lancer-app:
    name: Lancer app target (build_sim)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_27.0.app || sudo xcode-select -s /Applications/Xcode_26.0.1.app || sudo xcode-select -s /Applications/Xcode_26.0.app || true
      # Lancer.xcodeproj is generated by XcodeGen from project.yml (gitignored),
      # so CI must generate it before building.
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      # The full app target catches strict-concurrency / module-visibility breaks
      # that `swift test` (incremental SPM) silently misses. The watchOS app is
      # not part of v1 (no watch targets in project.yml), so no watchOS SDK is
      # needed on the runner.
      - name: Build app target for simulator
        run: >
          xcodebuild build
          -project Lancer.xcodeproj
          -scheme Lancer
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO

  daemon-go:
    name: Daemon (Go build + test + vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build, test, vet
        run: |
          set -e
          for mod in lancerd push-backend lancer-mcp; do
            echo "::group::$mod"
            (cd daemon/$mod && go build ./... && go vet ./... && go test ./...)
            echo "::endgroup::"
          done
