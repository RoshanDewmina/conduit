name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  conduitkit-spm:
    name: ConduitKit (SPM build + test)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.1.app || sudo xcode-select -s /Applications/Xcode_26.0.app || true
      - name: Resolve dependencies
        run: swift package resolve
        working-directory: Packages/ConduitKit
      - name: Run tests
        run: swift test --configuration debug
        working-directory: Packages/ConduitKit

  conduit-app:
    name: Conduit app target (build_sim)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.1.app || sudo xcode-select -s /Applications/Xcode_26.0.app || true
      # Conduit.xcodeproj is generated by XcodeGen from project.yml (gitignored),
      # so CI must generate it before building.
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      # CI runner (macos-15, Xcode 26.0.1) lacks watchOS 26.0 SDK.
      # The Conduit scheme embeds ConduitWatch, so strip that dependency
      # from the generated pbxproj before building.
      - name: Remove watchOS dependency from project
        run: |
          # Remove the ConduitWatch embed dependency from the Conduit target
          sed -i '' '/ConduitWatch.*embed.*true/d' Conduit.xcodeproj/project.pbxproj
          # Also remove any remaining watch target references from the scheme
          sed -i '' '/ConduitWatch/d' Conduit.xcodeproj/xcshareddata/xcschemes/Conduit.xcscheme 2>/dev/null || true
      # The full app target catches strict-concurrency / module-visibility breaks
      # that `swift test` (incremental SPM) silently misses.
      - name: Build app target for simulator
        run: >
          xcodebuild build
          -project Conduit.xcodeproj
          -scheme Conduit
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO

  daemon-go:
    name: Daemon (Go build + test + vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build, test, vet
        run: |
          set -e
          for mod in conduitd push-backend conduit-mcp; do
            echo "::group::$mod"
            (cd daemon/$mod && go build ./... && go vet ./... && go test ./...)
            echo "::endgroup::"
          done
