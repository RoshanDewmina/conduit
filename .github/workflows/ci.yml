name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lancerkit-spm:
    name: LancerKit (SPM build + test)
    runs-on: macos-15
    # Safety net, not a tuning knob: without this, a genuine hang (e.g. the
    # cooperative-thread-pool deadlock fixed alongside this line — see
    # OpenSSHKeyParserTests.swift's .serialized trait) silently burns CI
    # minutes for GitHub's default 6h job cap instead of failing fast.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_27.0.app || sudo xcode-select -s /Applications/Xcode_26.0.1.app || sudo xcode-select -s /Applications/Xcode_26.0.app || true
      - name: Resolve dependencies
        run: swift package resolve
        working-directory: Packages/LancerKit
      - name: Run tests
        # --no-parallel: Swift Testing's default concurrent scheduling hands
        # every test in every suite to the shared cooperative thread pool at
        # once. On this runner's small core count that's not just slower —
        # it deadlocks (confirmed: 48+ min with zero completed tests, then a
        # second, only-partially-fixed hang after serializing just the worst
        # offender). Fully serial is ~42s locally, no risk of thread
        # starvation regardless of what any given test does. The
        # `.serialized` trait on OpenSSHKeyParserTests stays as defense in
        # depth if this flag is ever removed without the reason being
        # rediscovered.
        run: swift test --configuration debug --no-parallel
        working-directory: Packages/LancerKit

  lancer-app:
    name: Lancer app target (build_sim)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_27.0.app || sudo xcode-select -s /Applications/Xcode_26.0.1.app || sudo xcode-select -s /Applications/Xcode_26.0.app || true
      # Lancer.xcodeproj is generated by XcodeGen from project.yml (gitignored),
      # so CI must generate it before building.
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      # The full app target catches strict-concurrency / module-visibility breaks
      # that `swift test` (incremental SPM) silently misses. The watchOS app is
      # not part of v1 (no watch targets in project.yml), so no watchOS SDK is
      # needed on the runner.
      - name: Build app target for simulator
        run: >
          xcodebuild build
          -project Lancer.xcodeproj
          -scheme Lancer
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO

  daemon-go:
    name: Daemon (Go build + test + vet)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build, test, vet
        run: |
          set -e
          for mod in lancerd push-backend lancer-mcp; do
            echo "::group::$mod"
            (cd daemon/$mod && go build ./... && go vet ./... && go test ./...)
            echo "::endgroup::"
          done
