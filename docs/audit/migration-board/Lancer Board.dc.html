<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lancer — Migration Board (target UI)</title>
<link rel="stylesheet" href="lancer.css" />
<style>
  html,body{margin:0;height:100%;background:#09090c;}
  /* top legend bar */
  #legend{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;gap:14px;
    padding:9px 16px;background:rgba(9,9,12,.82);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08);
    font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;color:#9fa0ac;}
  #legend b{color:#edeef2;letter-spacing:.04em;}
  #legend .k{display:inline-flex;align-items:center;gap:6px;}
  #legend .sw{width:9px;height:9px;border-radius:2px;display:inline-block;}
  #legend .hint{margin-left:auto;color:#6a6b78;}
</style>
</head>
<body>
  <div id="legend">
    <b>LANCER · target UI</b>
    <span class="k"><span class="sw" style="background:#6ee7a8"></span>Add</span>
    <span class="k"><span class="sw" style="background:#8aa0ff"></span>Redesign</span>
    <span class="k"><span class="sw" style="background:#6a6b78"></span>Keep</span>
    <span class="k"><span class="sw" style="background:#ff9b8f"></span>Remove</span>
    <span class="hint">scroll to pan · ⌘/ctrl-scroll or pinch to zoom · drag artboard headers to reorder</span>
  </div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx?v=20260615-platform"></script>
  <script type="text/babel" src="cc-components.jsx?v=20260615-platform"></script>
  <script type="text/babel" src="cc-screens-1.jsx?v=20260615-platform"></script>
  <script type="text/babel" src="cc-screens-2.jsx?v=20260615-platform"></script>
  <script type="text/babel" src="cc-screens-3.jsx?v=20260615-platform"></script>
  <script type="text/babel" src="cc-platform-surfaces.jsx?v=20260615-platform"></script>
  <script type="text/babel" src="cc-migration.jsx?v=20260615-platform"></script>
  <script type="text/babel" src="cc-screens-4.jsx?v=20260615-platform"></script>
  <script type="text/babel" src="cc-screens-5.jsx?v=20260615-platform"></script>
  <script type="text/babel" src="cc-screens-6.jsx?v=20260615-platform"></script>
  <script type="text/babel" src="cc-design-system.jsx?v=20260615-platform"></script>
  <script type="text/babel" src="cc-mount.jsx?v=20260615-platform"></script>
</body>
</html>
