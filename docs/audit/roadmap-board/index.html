<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lancer — Roadmap Board (future features)</title>
<link rel="stylesheet" href="../migration-board/lancer.css" />
<style>
  html,body{margin:0;height:100%;background:#09090c;}
  /* top legend bar */
  #legend{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;gap:14px;
    padding:9px 16px;background:rgba(9,9,12,.82);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08);
    font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;color:#9fa0ac;}
  #legend b{color:#edeef2;letter-spacing:.04em;}
  #legend .k{display:inline-flex;align-items:center;gap:6px;}
  #legend .sw{width:9px;height:9px;border-radius:2px;display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:9px;}
  #legend .hint{margin-left:auto;color:#6a6b78;}
</style>
</head>
<body>
  <div id="legend">
    <b>LANCER · roadmap UI</b>
    <span class="k"><span class="sw" style="background:#6a6b78"></span>T0 foundations</span>
    <span class="k"><span class="sw" style="background:#56b3c2"></span>T1 usage</span>
    <span class="k"><span class="sw" style="background:#8aa0ff"></span>T2 control</span>
    <span class="k"><span class="sw" style="background:#d9b24a"></span>T3 awareness</span>
    <span class="k"><span class="sw" style="background:#b07ad9"></span>T4 trust &amp; scale</span>
    <span class="hint">future / post-launch · scroll to pan · ⌘/ctrl-scroll or pinch to zoom · drag artboard headers to reorder</span>
  </div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="../migration-board/design-canvas.jsx"></script>
  <script type="text/babel" src="../migration-board/cc-components.jsx"></script>
  <script type="text/babel" src="../migration-board/cc-screens-1.jsx"></script>
  <script type="text/babel" src="../migration-board/cc-screens-2.jsx"></script>
  <script type="text/babel" src="../migration-board/cc-screens-3.jsx"></script>
  <script type="text/babel" src="cc-roadmap.jsx"></script>
</body>
</html>
