name: Conduit
options:
  bundleIdPrefix: dev.conduit
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.2"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    ENABLE_APP_INTENTS_METADATA_EXTRACTION: "NO"
    SWIFT_STRICT_CONCURRENCY: "complete"
    OTHER_SWIFT_FLAGS: "-warn-implicit-overrides"

packages:
  ConduitKit:
    path: Packages/ConduitKit

targets:
  Conduit:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Conduit
    resources:
      - path: Conduit/Resources
    info:
      path: Conduit/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        NSFaceIDUsageDescription: "Conduit uses Face ID to protect your SSH keys and authenticate before connecting to remote servers."
        UIBackgroundModes:
          - remote-notification
          - fetch
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    entitlements:
      path: Conduit/Conduit.entitlements
      properties:
        aps-environment: production
        com.apple.developer.icloud-container-identifiers:
          - iCloud.dev.conduit.mobile
        com.apple.developer.icloud-containers-environment: Development
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)dev.conduit.mobile
        keychain-access-groups:
          - $(AppIdentifierPrefix)dev.conduit.mobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.conduit.mobile
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_EMIT_LOC_STRINGS: "YES"
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_BITCODE: "NO"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 39HM2X8GS6
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
    dependencies:
      - package: ConduitKit
        product: AppFeature
      - target: ConduitWatch
        embed: true

  ConduitWatch:
    type: application
    platform: watchOS
    deploymentTarget: "26.0"
    sources:
      - path: ConduitWatch
    info:
      path: ConduitWatch/Info.plist
      properties:
        CFBundleDisplayName: Conduit
        WKApplication: true
        WKCompanionAppBundleIdentifier: dev.conduit.mobile
    entitlements:
      path: ConduitWatch/ConduitWatch.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.conduit.mobile.watchkitapp
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        WATCHOS_DEPLOYMENT_TARGET: "26.0"
        TARGETED_DEVICE_FAMILY: "4"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 39HM2X8GS6
        SWIFT_VERSION: "6.2"
        SWIFT_STRICT_CONCURRENCY: complete
        OTHER_SWIFT_FLAGS: "-warn-implicit-overrides"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_BITCODE: "NO"
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
    dependencies:
      - package: ConduitKit
        product: ConduitCore

schemes:
  Conduit:
    build:
      targets:
        Conduit: all
        ConduitWatch: all
    run:
      config: Debug
      storeKitConfiguration: Conduit/Conduit.storekit
    archive:
      config: Release

  ConduitWatch:
    build:
      targets:
        ConduitWatch: all
    run:
      config: Debug
    archive:
      config: Release
