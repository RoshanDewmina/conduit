name: Conduit
options:
  bundleIdPrefix: dev.conduit
  deploymentTarget:
    iOS: "27.0"
  xcodeVersion: "27.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.2"
    IPHONEOS_DEPLOYMENT_TARGET: "27.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    # Must stay YES: the Approve/Reject Live Activity & widget buttons are backed
    # by App Intents (ApprovalActionIntent / ConduitWidgetIntent). With extraction
    # off, the Metadata.appintents bundle isn't generated and the system can fail
    # to resolve those intents in Release → lock-screen approvals silently no-op.
    ENABLE_APP_INTENTS_METADATA_EXTRACTION: "YES"
    SWIFT_STRICT_CONCURRENCY: "complete"
    OTHER_SWIFT_FLAGS: "-warn-implicit-overrides"
    # Push backend HTTPS URL — set to the Cloud Run service URL after deploy.
    # No plain-HTTP fallback; ATS rejects http:// in Release builds.
    # Example: https://conduit-push-HASH-ts.a.run.app
    CONDUIT_PUSH_BACKEND_URL: "https://conduit-push-y4wpy6zeva-ts.a.run.app"
    # Standard account configuration (Supabase project sfuqarvoxfupvadsvejb).
    # The PUBLISHABLE/anon key is a PUBLIC client key (RLS-protected) and ships in
    # the app binary by design, so it's committed here. NEVER put the service-role
    # key (or the JWT secret) here — those are server-side secrets.
    CONDUIT_SUPABASE_URL: "https://sfuqarvoxfupvadsvejb.supabase.co"
    CONDUIT_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmdXFhcnZveGZ1cHZhZHN2ZWpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5OTU1MTEsImV4cCI6MjA5NzU3MTUxMX0.qQCNAR3VQvilyySnx7037bicekJt3jL_TNH2GnZ_CaE"

packages:
  ConduitKit:
    path: Packages/ConduitKit
  # Crash reporting — privacy-friendly, self-hostable. No ad/tracking data collected.
  # Set sentryDSN in Conduit/ConduitApp.swift before release. See ARCHITECTURE.md §19.
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.0.0

targets:
  Conduit:
    type: application
    platform: iOS
    deploymentTarget: "27.0"
    sources:
      - path: Conduit
    resources:
      - path: Conduit/Resources
    info:
      path: Conduit/Info.plist
      properties:
        # Drive the bundle version strings from the build settings so a single
        # MARKETING_VERSION / CURRENT_PROJECT_VERSION bump is authoritative
        # (XcodeGen otherwise hardcodes literal "1.0" / "1").
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchStoryboardName: LaunchScreen
        NSCameraUsageDescription: "Conduit uses the camera to scan the pairing QR code shown by your host when connecting a new bridge."
        NSFaceIDUsageDescription: "Conduit uses Face ID to protect your SSH keys and authenticate before connecting to remote servers."
        NSMicrophoneUsageDescription: "Conduit uses the microphone so you can dictate terminal commands and agent prompts by voice."
        NSSpeechRecognitionUsageDescription: "Conduit transcribes your speech to text so you can dictate terminal commands and agent prompts instead of typing."
        NSSupportsLiveActivities: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - fetch
          - remote-notification
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        CFBundleURLTypes:
          - CFBundleURLName: dev.conduit.mobile
            CFBundleURLSchemes:
              - conduit
        # Push backend HTTPS URL — read at runtime by ConduitApp.swift.
        # Set CONDUIT_PUSH_BACKEND_URL in build settings to the Cloud Run service URL.
        CONDUIT_PUSH_BACKEND_URL: "$(CONDUIT_PUSH_BACKEND_URL)"
        # Standard-account (Supabase) config — read at runtime by AccountConfiguration.fromBundle.
        # Empty build-setting values leave standard sign-in unavailable (offline pairing still works);
        # inject real values via local/CI build settings, never committed.
        CONDUIT_SUPABASE_URL: "$(CONDUIT_SUPABASE_URL)"
        CONDUIT_SUPABASE_PUBLISHABLE_KEY: "$(CONDUIT_SUPABASE_PUBLISHABLE_KEY)"
        # iCloud/CloudKit gate, read at runtime by SyncKit/CloudSync.swift.
        # MUST stay false while building with Conduit-DeviceTesting.entitlements
        # (no icloud-services entitlement). Flip to true together with the
        # entitlements swap below, once the iCloud capability + CloudKit
        # container are enabled in the Apple Developer portal.
        CONDUIT_ICLOUD_ENABLED: true
        ITSAppUsesNonExemptEncryption: false
    # NOTE: iCloud + Push (aps-environment) require a paid Apple Developer
    # account. Entitlements are already pointing at `Conduit.entitlements`
    # (push + CloudKit declared). To activate them:
    # 1. Enroll in the Apple Developer Program ($99/yr) or sign in with a paid Apple ID
    # 2. Enable Push Notifications + CloudKit container in App Store Connect
    # 3. Flip CONDUIT_ICLOUD_ENABLED above to true
    # See docs/ship-gate-owner-steps.md for the complete checklist.
    entitlements:
      path: Conduit/Conduit.entitlements
      properties:
        aps-environment: production
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.dev.conduit.mobile
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)dev.conduit.mobile
        keychain-access-groups:
          - $(AppIdentifierPrefix)dev.conduit.mobile
        com.apple.security.application-groups:
          - group.dev.conduit.mobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.conduit.mobile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_EMIT_LOC_STRINGS: "YES"
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_BITCODE: "NO"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 39HM2X8GS6
    dependencies:
      - package: ConduitKit
        product: AppFeature
      - package: Sentry
        product: Sentry
      - sdk: AppIntents.framework
      - target: ConduitLiveActivityWidget
        embed: true
      - target: ConduitWidget
        embed: true
      # ConduitWatch is intentionally NOT embedded in the iOS app: an embedded
      # watchOS app/extension makes the iOS .app un-installable on the iOS
      # Simulator via simctl/XcodeBuildMCP (watchOS-arch binary isn't runnable
      # there), which is the project's authoritative verification path. The
      # target still builds standalone via its own scheme. Re-embed only once a
      # paired-watch-sim or device flow replaces the simctl install path.

  ConduitWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: ConduitWatch
    info:
      path: ConduitWatch/Info.plist
    entitlements:
      path: ConduitWatch/ConduitWatch.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.conduit.mobile.watchapp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        WATCHOS_DEPLOYMENT_TARGET: "11.0"
        TARGETED_DEVICE_FAMILY: "4"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 39HM2X8GS6
        SWIFT_VERSION: "6.2"
        ENABLE_BITCODE: "NO"
    dependencies:
      - package: ConduitKit
        product: ConduitCore
      - sdk: WatchConnectivity.framework
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - target: ConduitWatchWidget
        embed: true

  ConduitWatchWidget:
    type: app-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: ConduitWatchWidget
    info:
      path: ConduitWatchWidget/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ConduitWatchWidgetBundle"
    entitlements:
      path: ConduitWatchWidget/ConduitWatchWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.dev.conduit.mobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.conduit.mobile.watchwidget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        WATCHOS_DEPLOYMENT_TARGET: "11.0"
        TARGETED_DEVICE_FAMILY: "4"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 39HM2X8GS6
        SWIFT_VERSION: "6.2"
        ENABLE_BITCODE: "NO"
    dependencies:
      - package: ConduitKit
        product: ConduitCore
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: AppIntents.framework

  ConduitLiveActivityWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "27.0"
    sources:
      - path: ConduitLiveActivityWidget
    info:
      path: ConduitLiveActivityWidget/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.conduit.mobile.liveactivity
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        IPHONEOS_DEPLOYMENT_TARGET: "27.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 39HM2X8GS6
        SWIFT_VERSION: "6.2"
        ENABLE_BITCODE: "NO"
    dependencies:
      - package: ConduitKit
        product: SessionFeature
      - sdk: AppIntents.framework
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: ActivityKit.framework

  ConduitWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "27.0"
    sources:
      - path: ConduitWidget
    info:
      path: ConduitWidget/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: ConduitWidget/ConduitWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.dev.conduit.mobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.conduit.mobile.widget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        IPHONEOS_DEPLOYMENT_TARGET: "27.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 39HM2X8GS6
        SWIFT_VERSION: "6.2"
        ENABLE_BITCODE: "NO"
    dependencies:
      - package: ConduitKit
        product: ConduitCore
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: AppIntents.framework

  ConduitUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "27.0"
    sources:
      - path: ConduitUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.conduit.mobile.uitests
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 39HM2X8GS6
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: Conduit
      - sdk: AppIntents.framework

schemes:
  Conduit:
    build:
      targets:
        Conduit: all
        ConduitUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Conduit/Conduit.storekit
    test:
      config: Debug
      targets:
        - ConduitUITests
    archive:
      config: Release
