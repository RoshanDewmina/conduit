name: Conduit
options:
  bundleIdPrefix: dev.conduit
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.2"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    SWIFT_STRICT_CONCURRENCY: "complete"
    OTHER_SWIFT_FLAGS: "-warn-implicit-overrides"

packages:
  ConduitKit:
    path: Packages/ConduitKit

targets:
  Conduit:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Conduit
    resources:
      - path: Conduit/Resources
    info:
      path: Conduit/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.conduit.mobile
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_EMIT_LOC_STRINGS: "YES"
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    dependencies:
      - package: ConduitKit
        product: AppFeature

schemes:
  Conduit:
    build:
      targets:
        Conduit: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
    archive:
      config: Release
